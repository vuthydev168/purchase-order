<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Sign In — POMS</title>
<link rel="stylesheet" href="shared.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
html, body { height: 100%; display: flex; align-items: center; justify-content: center; }
body { background: var(--bg); padding: 20px; }

.auth-wrap {
  width: 90%;
  max-width: 400px;
  display: flex; flex-direction: column; gap: 0;
}

@media (max-width: 600px)  { .auth-wrap { width: 80vw; } }
@media (min-width: 601px) and (max-width: 1024px) { .auth-wrap { width: 60vw; max-width: 520px; } }
@media (min-width: 1025px) { .auth-wrap { width: 100%; max-width: 400px; } }

/* Brand */
.auth-brand {
  display: flex; align-items: center; gap: 12px;
  justify-content: center; margin-bottom: 32px;
}
.auth-logo {
  width: 44px; height: 44px; border-radius: 13px;
  background: linear-gradient(135deg, var(--acc), var(--pur));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff;
}
.auth-brand-name {
  font-size: 22px; font-weight: 800; letter-spacing: -.5px;
}
.auth-brand-name span { color: var(--acc); }

/* Card */
.auth-card {
  background: var(--s1); border: 1px solid var(--bd);
  border-radius: 20px; padding: 28px 28px 24px;
  box-shadow: var(--sh2);
}
.auth-title    { font-size: 20px; font-weight: 800; margin-bottom: 4px; letter-spacing: -.4px; }
.auth-subtitle { font-size: 13px; color: var(--mut); margin-bottom: 24px; }

/* Fields */
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 11px; font-weight: 700; color: var(--tx2);
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
}
.field input {
  width: 100%; background: var(--s2); border: 1.5px solid var(--bd);
  border-radius: 12px; color: var(--txt); font-family: var(--sans);
  font-size: 15px; padding: 12px 14px; outline: none;
  transition: border .17s, box-shadow .17s; -webkit-appearance: none;
}
.field input:focus {
  border-color: var(--acc); background: #fff;
  box-shadow: 0 0 0 3px rgba(67,97,238,.1);
}
.field input::placeholder { color: var(--mut); }

/* Password toggle */
.field-pw { position: relative; }
.field-pw input { padding-right: 46px; }
.pw-toggle {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: var(--mut); cursor: pointer; font-size: 14px;
  background: none; border: none; padding: 0;
}
.pw-toggle:hover { color: var(--acc); }

/* Forgot */
.field-meta {
  display: flex; justify-content: flex-end; margin-top: -8px; margin-bottom: 14px;
}
.field-meta a { font-size: 12px; color: var(--acc); font-weight: 600; }

/* Submit */
.auth-btn {
  width: 100%; height: 50px; border-radius: 14px;
  background: linear-gradient(135deg, var(--acc), var(--pur));
  border: none; color: #fff; font-family: var(--sans);
  font-weight: 700; font-size: 15px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(67,97,238,.28);
  transition: opacity .15s, transform .12s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.auth-btn:hover  { opacity: .92; }
.auth-btn:active { transform: scale(.98); }

/* Divider */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: var(--mut); font-size: 12px; font-weight: 500;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--bd);
}

/* OAuth button */
.oauth-btn {
  width: 100%; height: 46px; border-radius: 12px;
  background: var(--s1); border: 1.5px solid var(--bd);
  color: var(--tx2); font-family: var(--sans); font-weight: 600; font-size:14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all .15s; margin-bottom: 10px;
}
.oauth-btn:hover { background: var(--s2); border-color: var(--acc); }
.oauth-btn img { width: 18px; height: 18px; }

/* Footer link */
.auth-footer {
  text-align: center; margin-top: 20px;
  font-size: 13px; color: var(--mut);
}
.auth-footer a { color: var(--acc); font-weight: 600; }

/* Override shared footer style for auth pages */
.auth-wrap .app-footer {
  border-top: none; background: transparent; margin-top: 16px;
}
</style>
</head>
<body>
<div class="auth-wrap">

  <div class="auth-brand">
    <div class="auth-logo"><i class="fa fa-file-invoice-dollar"></i></div>
    <div class="auth-brand-name">PO<span>System</span></div>
  </div>

  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-subtitle">Sign in to your account to continue</div>

    <div class="field">
      <label>Email</label>
      <input type="email" placeholder="john@company.com" autocomplete="email">
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-pw">
        <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password">
        <button class="pw-toggle" onclick="togglePw()" type="button">
          <i class="fa fa-eye" id="pwIcon"></i>
        </button>
      </div>
    </div>

    <div class="field-meta">
      <a href="#">Forgot password?</a>
    </div>

    <a href="index.html">
      <button class="auth-btn">
        <i class="fa fa-arrow-right-to-bracket"></i> Sign In
      </button>
    </a>

    <div class="divider">or continue with</div>

    <button class="oauth-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="auth-footer">
    Don't have an account? <a href="register.html">Create one</a>
  </div>

  <p class="app-footer">Developed by <span>AIS Technology</span></p>

</div>

<script>
function togglePw() {
  var inp = document.getElementById('pwInput');
  var ico = document.getElementById('pwIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'fa fa-eye-slash';
  } else {
    inp.type = 'password';
    ico.className = 'fa fa-eye';
  }
}
</script>
</body>
</html>
