<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>Dashboard — POMS</title>
  <link rel="stylesheet" href="shared.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ── Dashboard-specific ── */
    .hero {
      background: linear-gradient(135deg, var(--acc) 0%, var(--pur) 100%);
      border-radius: 18px;
      padding: 22px 24px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      right: -30px;
      top: -30px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .07);
      pointer-events: none;
    }

    .hero::before {
      content: '';
      position: absolute;
      right: 20px;
      bottom: -25px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .05);
      pointer-events: none;
    }

    .hero-greet {
      font-size: 13px;
      color: rgba(255, 255, 255, .72);
      margin-bottom: 4px;
    }

    .hero-title {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 2px;
      letter-spacing: -.4px;
    }

    .hero-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, .58);
    }

    .hero-btns {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
    }

    .hero-btn {
      height: 36px;
      padding: 0 16px;
      border-radius: 9px;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      border: none;
      transition: all .15s;
    }

    .hero-btn.primary {
      background: #fff;
      color: var(--acc);
    }

    .hero-btn.ghost {
      background: rgba(255, 255, 255, .18);
      color: #fff;
    }

    .hero-btn:hover {
      transform: translateY(-1px);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    @media(min-width:900px) {
      .stat-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .stat-card {
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--sh);
      position: relative;
      overflow: hidden;
      transition: box-shadow .15s, transform .12s;
    }

    .stat-card:hover {
      box-shadow: var(--sh2);
      transform: translateY(-1px);
    }

    .stat-card::after {
      content: '';
      position: absolute;
      right: -12px;
      bottom: -12px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      opacity: .07;
    }

    .stat-card.blue::after {
      background: var(--acc);
    }

    .stat-card.green::after {
      background: var(--grn);
    }

    .stat-card.amber::after {
      background: var(--amb);
    }

    .stat-card.cyan::after {
      background: var(--cyn);
    }

    .sc-icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      margin-bottom: 12px;
    }

    .sc-val {
      font-size: 28px;
      font-weight: 800;
      font-family: var(--mono);
      line-height: 1;
      letter-spacing: -1.5px;
    }

    .sc-label {
      font-size: 11px;
      color: var(--mut);
      margin-top: 4px;
      font-weight: 500;
    }

    .sc-delta {
      font-size: 11px;
      margin-top: 6px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sc-delta.up {
      color: var(--grn);
    }

    .sc-delta.dn {
      color: var(--red);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    @media(min-width:900px) {
      .row.split {
        grid-template-columns: 1fr 1fr;
      }
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .qg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    @media(min-width:600px) {
      .qg {
        grid-template-columns: repeat(6, 1fr);
      }
    }

    .qc {
      background: var(--s1);
      border: 1.5px solid var(--bd);
      border-radius: 14px;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      box-shadow: var(--sh);
      transition: box-shadow .15s, transform .12s, border-color .15s;
    }

    .qc:hover {
      box-shadow: var(--sh2);
      transform: translateY(-2px);
      border-color: var(--acc);
    }

    .qc:active {
      transform: scale(.96);
    }

    .qc-ic {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin: 0 auto 9px;
    }

    .qc-lb {
      font-size: 11px;
      font-weight: 600;
      color: var(--tx2);
      line-height: 1.3;
    }

    /* Supplier mini avatar */
    .sup-av {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
    }

    .sup-av img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
      border-radius: inherit;
    }

    .sup-av .ini {
      position: relative;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- SIDEBAR -->
    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-actions">
          <div class="ibt"><i class="fa fa-bell"></i>
            <div class="notif"></div>
          </div>
          <a href="purchase.html"><button class="t-btn"><i class="fa fa-plus"></i> New PO</button></a>
        </div>
      </div>

      <div class="content">
        <!-- STATS -->
        <div class="stat-grid">
          <div class="stat-card blue">
            <div class="sc-icon" style="background:var(--acc-lt);color:var(--acc);"><i class="fa fa-file-invoice"></i>
            </div>
            <div class="sc-val">48</div>
            <div class="sc-label">Total Orders</div>
            <div class="sc-delta up"><i class="fa fa-arrow-up"></i> +12% this month</div>
          </div>
          <div class="stat-card green">
            <div class="sc-icon" style="background:var(--grn-lt);color:var(--grn);"><i class="fa fa-circle-check"></i>
            </div>
            <div class="sc-val">31</div>
            <div class="sc-label">Sent &amp; Paid</div>
            <div class="sc-delta up"><i class="fa fa-arrow-up"></i> +8% this month</div>
          </div>
          <div class="stat-card amber">
            <div class="sc-icon" style="background:var(--amb-lt);color:var(--amb);"><i class="fa fa-clock"></i></div>
            <div class="sc-val">7</div>
            <div class="sc-label">Pending</div>
            <div class="sc-delta dn"><i class="fa fa-arrow-down"></i> -2 from last week</div>
          </div>
          <div class="stat-card cyan">
            <div class="sc-icon" style="background:var(--cyn-lt);color:var(--cyn);"><i class="fa fa-store"></i></div>
            <div class="sc-val">7</div>
            <div class="sc-label">Suppliers</div>
            <div class="sc-delta up"><i class="fa fa-circle"></i> 4 online now</div>
          </div>
        </div>

        <!-- QUICK MENU -->
        <div class="section-title">Quick Menu</div>
        <div class="qg">
          <a href="purchase.html">
            <div class="qc">
              <div class="qc-ic" style="background:var(--acc-lt);color:var(--acc);"><i class="fa fa-plus-circle"></i>
              </div>
              <div class="qc-lb">New Order</div>
            </div>
          </a>
          <a href="orders.html">
            <div class="qc">
              <div class="qc-ic" style="background:var(--grn-lt);color:var(--grn);"><i class="fa fa-list-check"></i>
              </div>
              <div class="qc-lb">PO History</div>
            </div>
          </a>
          <a href="suppliers.html">
            <div class="qc">
              <div class="qc-ic" style="background:var(--amb-lt);color:var(--amb);"><i class="fa fa-store"></i></div>
              <div class="qc-lb">Suppliers</div>
            </div>
          </a>
          <a href="currencies.html">
            <div class="qc">
              <div class="qc-ic" style="background:var(--cyn-lt);color:var(--cyn);"><i class="fa fa-coins"></i></div>
              <div class="qc-lb">Currencies</div>
            </div>
          </a>
          <a href="exchange.html">
            <div class="qc">
              <div class="qc-ic" style="background:#f0eeff;color:var(--pur);"><i
                  class="fa fa-arrow-right-arrow-left"></i></div>
              <div class="qc-lb">Exchange</div>
            </div>
          </a>
          <a href="payment.html">
            <div class="qc">
              <div class="qc-ic" style="background:var(--red-lt);color:var(--red);"><i class="fa fa-credit-card"></i>
              </div>
              <div class="qc-lb">Payments</div>
            </div>
          </a>
        </div>
      </div><!-- content -->
    </div><!-- main -->
  </div><!-- app -->
</body>

</html>
